name: Tests with n8n Webhook

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=json
        env:
          CI: true

      - name: Parse test results
        if: always()
        id: test-results
        run: |
          if [ -f "test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected' test-results/results.json)
            PASSED=$(jq '[.suites[].suites[] | select(.status == "passed")] | length' test-results/results.json)
            FAILED=$(jq '[.suites[].suites[] | select(.status == "failed")] | length' test-results/results.json)
            DURATION=$(jq '.stats.duration / 1000 | round' test-results/results.json)
            
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "duration=$DURATION" >> $GITHUB_OUTPUT
          fi

      - name: Trigger n8n workflow - Test Completed
        if: always()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "test_completed",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "author": "${{ github.actor }}",
              "run_id": "${{ github.run_id }}",
              "status": "${{ job.status }}",
              "test_results": {
                "total": "${{ steps.test-results.outputs.total }}",
                "passed": "${{ steps.test-results.outputs.passed }}",
                "failed": "${{ steps.test-results.outputs.failed }}",
                "duration_seconds": "${{ steps.test-results.outputs.duration }}"
              },
              "workflow_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  notify:
    name: Notify n8n on Completion
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Send final status to n8n
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "workflow_completed",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "run_id": "${{ github.run_id }}",
              "overall_status": "${{ needs.test.result }}",
              "timestamp": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'",
              "workflow_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
