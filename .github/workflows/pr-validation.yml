name: PR - Quick Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run tests (Chromium only for speed)
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.existsSync('test-results/results.json') 
              ? JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'))
              : null;

            let comment = '## ✅ CI Validation Results\n\n';
            comment += '- **TypeScript**: ✅ OK\n';
            comment += '- **Tests (Chromium)**: ✅ Running\n';
            comment += '\nFull matrix tests will run on merge.\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
